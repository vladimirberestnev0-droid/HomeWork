<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свой Мастер 86 — Кабинет мастера</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#E67A4B">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/HomeWork/css/core/variables.css">
    <link rel="stylesheet" href="/HomeWork/css/core/base.css">
    <link rel="stylesheet" href="/HomeWork/css/core/utils.css">
    <link rel="stylesheet" href="/HomeWork/css/components/buttons.css">
    <link rel="stylesheet" href="/HomeWork/css/components/cards.css">
    <link rel="stylesheet" href="/HomeWork/css/components/modals.css">
    <link rel="stylesheet" href="/HomeWork/css/themes/dark.css">
</head>
<body>
    <div class="container py-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <a href="/HomeWork/" class="logo-link d-flex align-items-center gap-2">
                <i class="fas fa-house" style="color: var(--accent);"></i>
                <span class="fw-bold">Свой Мастер 86</span>
            </a>
            <nav class="d-flex gap-3">
                <a href="/HomeWork/">Главная</a>
                <a href="/HomeWork/client.html">Клиентам</a>
                <a href="/HomeWork/masters.html" class="active">Мастерам</a>
                <button class="btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="#" id="logoutLink" class="btn btn-sm btn-outline-danger rounded-pill">
                    <i class="fas fa-sign-out-alt me-1"></i> Выйти
                </a>
            </nav>
        </header>

        <div id="authRequired" class="text-center p-5 d-none">
            <i class="fas fa-user-tie fa-4x mb-3" style="color: var(--accent);"></i>
            <h3>Вход в кабинет мастера</h3>
            <button class="btn mt-3" onclick="AuthUI.showLoginModal()">Войти</button>
        </div>

        <div id="masterCabinet" class="d-none">
            <div class="row g-4">
                <!-- Левая колонка: профиль -->
                <div class="col-md-4">
                    <div class="card p-4 text-center">
                        <div class="avatar-circle mx-auto mb-3">
                            <i class="fas fa-user-tie fa-3x"></i>
                        </div>
                        <h4 id="masterName">Загрузка...</h4>
                        <p class="text-secondary" id="masterCategories"></p>
                        <hr>
                        <div class="text-start">
                            <p><i class="fas fa-star me-2" style="color: gold;"></i> Рейтинг: <span id="masterRating">0</span> (<span id="masterReviews">0</span> отзывов)</p>
                            <p><i class="fas fa-box me-2"></i> Выполнено: <span id="masterCompleted">0</span></p>
                        </div>
                    </div>
                </div>

                <!-- Правая колонка: отклики и чаты -->
                <div class="col-md-8">
                    <ul class="nav nav-tabs mb-4">
                        <li class="nav-item">
                            <button class="nav-link active" data-tab="responses">Отклики</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-tab="chats">Чаты</button>
                        </li>
                    </ul>

                    <div id="responsesTab" class="tab-content active">
                        <div id="responsesList"></div>
                    </div>

                    <div id="chatsTab" class="tab-content d-none">
                        <div id="chatsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка отклика -->
    <div class="modal fade" id="respondModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Откликнуться на заказ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Ваша цена (₽)</label>
                        <input type="number" class="form-control" id="responsePrice" min="500">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Комментарий</label>
                        <textarea class="form-control" id="responseComment" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="submitResponse">Откликнуться</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка отзыва о клиенте -->
    <div class="modal fade" id="reviewClientModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Оцените клиента</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-3">
                        <div class="rating-stars">
                            <span class="star" data-rating="1">★</span>
                            <span class="star" data-rating="2">★</span>
                            <span class="star" data-rating="3">★</span>
                            <span class="star" data-rating="4">★</span>
                            <span class="star" data-rating="5">★</span>
                        </div>
                    </div>
                    <textarea id="reviewClientText" class="form-control" rows="2" placeholder="Комментарий"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Пропустить</button>
                    <button type="button" class="btn btn-primary" id="submitClientReview">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    
    <script src="/HomeWork/js/pages/masters.js"></script>
</body>
</html>
