<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СВОЙ МАСТЕР 86 — Профиль мастера</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
    <link rel="stylesheet" href="/HomeWork/css/theme/theme-aurora.css">
</head>
<body>
    <!-- ДЕСКТОПНАЯ НАВИГАЦИЯ -->
    <div class="desktop-nav">
        <div class="desktop-nav-container">
            <a href="/HomeWork/" class="desktop-nav-item" id="desktopNavHome">
                <i class="fas fa-home"></i><span>Главная</span>
            </a>
            <a href="/HomeWork/client.html" class="desktop-nav-item" id="desktopNavOrders">
                <i class="fas fa-clipboard-list"></i><span>Заказы</span>
            </a>
            <a href="/HomeWork/masters.html" class="desktop-nav-item" id="desktopNavMasters">
                <i class="fas fa-user-tie"></i><span>Мастера</span>
            </a>
            <a href="#" class="desktop-nav-item requires-auth" id="desktopNavChats" style="display: none;">
                <i class="fas fa-comments"></i><span>Чаты</span>
            </a>
            <button class="desktop-nav-item create-btn" id="desktopCreateBtn">
                <i class="fas fa-plus-circle"></i><span>Создать заказ</span>
            </button>
            <button class="desktop-nav-item auth-btn" id="desktopAuthBtn">
                <i class="fas fa-sign-in-alt"></i><span>Войти</span>
            </button>
        </div>
    </div>

    <!-- ШАПКА -->
    <div class="header-premium">
        <div class="logo-premium" onclick="window.location.href='/HomeWork/'">
            <span class="logo-premium-text">СВОЙ86</span>
            <span class="logo-premium-small">ПРОФИЛЬ МАСТЕРА</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button class="city-button-premium" onclick="window.location.href='/HomeWork/'">
                <i class="fas fa-arrow-left"></i> На главную
            </button>
            <button class="notifications-bell" id="notificationsBell" title="Уведомления">
                <i class="fas fa-bell"></i>
                <span class="badge hidden" id="notificationsBadge">0</span>
            </button>
            <button class="theme-toggle btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="app-wrapper">
        <!-- СКЕЛЕТОН ЗАГРУЗКИ -->
        <div id="loadingSkeleton" class="loading-skeleton">
            <div class="text-center p-5">
                <div class="spinner-glow"></div>
                <p class="mt-3 text-secondary">Загрузка профиля...</p>
            </div>
        </div>

        <!-- ПРОФИЛЬ МАСТЕРА -->
        <div id="masterProfile" class="master-profile" style="display: none;">
            <!-- ШАПКА ПРОФИЛЯ -->
            <div class="profile-header">
                <div class="profile-avatar">
                    <img id="masterAvatar" src="https://via.placeholder.com/150" alt="Аватар">
                    <span class="verified-badge" id="verifiedBadge" style="display: none;">
                        <i class="fas fa-check"></i>
                    </span>
                </div>
                <div class="profile-info">
                    <h1 id="masterName">Загрузка...</h1>
                    <div class="master-rating" id="masterRating">
                        <span class="stars">★★★★★</span>
                        <span class="rating-value">0.0</span>
                    </div>
                    <div class="profile-stats">
                        <span><i class="fas fa-clipboard-list"></i> <span id="completedOrders">0</span> заказов</span>
                        <span><i class="fas fa-star"></i> <span id="reviewsCount">0</span> отзывов</span>
                        <span><i class="fas fa-bolt"></i> отклик <span id="responseTime">-</span></span>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="btn-contact" id="contactMasterBtn" style="display: none;">
                        <i class="fas fa-comment"></i> Связаться
                    </button>
                    <button class="btn-edit" id="editProfileBtn" style="display: none;">
                        <i class="fas fa-pencil-alt"></i> Редактировать
                    </button>
                </div>
            </div>

            <!-- О МАСТЕРЕ -->
            <div class="profile-section">
                <h3><i class="fas fa-user-circle"></i> О мастере</h3>
                <p class="about-text" id="masterAbout">Загрузка...</p>

                <div class="info-grid" id="infoGrid"></div>

                <div class="guarantee" id="masterGuarantee" style="display: none;">
                    <i class="fas fa-shield-alt"></i>
                    <span id="guaranteeText"></span>
                </div>
            </div>

            <!-- ПОРТФОЛИО -->
            <div class="profile-section">
                <h3><i class="fas fa-images"></i> Портфолио <span id="portfolioCount"></span></h3>
                <div class="portfolio-grid" id="portfolioGrid"></div>
            </div>

            <!-- ОТЗЫВЫ -->
            <div class="profile-section">
                <h3><i class="fas fa-comment-dots"></i> Отзывы <span id="reviewsTotal"></span></h3>
                
                <div class="reviews-filters" id="reviewsFilters"></div>
                <div class="reviews-list" id="reviewsList"></div>
                <button class="btn-more" id="loadMoreReviews" style="display: none;">
                    <i class="fas fa-chevron-down"></i> Показать ещё
                </button>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home"><i class="fas fa-home"></i><span>Главная</span></button>
        <button class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Поиск</span></button>
        <button class="nav-item create-order-btn" data-page="create-order">
            <i class="fas fa-plus-circle"></i><span>Заявка</span>
        </button>
        <button class="nav-item" data-page="orders"><i class="fas fa-clipboard-list"></i><span>Заказы</span></button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>

    <!-- МОДАЛКА ПРОСМОТРА ФОТО -->
    <div class="modal fade" id="portfolioModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="portfolioModalTitle"></h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body text-center">
                    <img id="portfolioModalImage" src="" style="max-width:100%; max-height:70vh;">
                    <p id="portfolioModalDesc" class="mt-3"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 1. CORE -->
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/store.js"></script>
    <script src="/HomeWork/js/core/cache.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <!-- 2. SERVICES -->
    <script src="/HomeWork/js/services/data-service.js"></script>
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/upload-service.js"></script>
    <script src="/HomeWork/js/services/orders-service.js"></script>
    <script src="/HomeWork/js/services/chat-service.js"></script>
    <script src="/HomeWork/js/services/moderation.js"></script>
    
    <!-- 3. COMPONENTS -->
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    <script src="/HomeWork/js/components/desktop-nav.js"></script>
    <script src="/HomeWork/js/components/notifications.js"></script>
    <script src="/HomeWork/js/components/notifications-center.js"></script>
    
    <!-- 4. PAGE -->
    <script src="/HomeWork/js/pages/master-profile.js"></script>
</body>
</html>
