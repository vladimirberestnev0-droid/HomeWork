<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения</title>
    <link rel="stylesheet" href="/HomeWork/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--deep-blue), #0a1a28);
        }
        .offline-container {
            max-width: 400px;
            animation: fadeInUp 0.6s ease;
        }
        .offline-icon {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: var(--text-soft);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn-offline {
            background: rgba(44, 213, 196, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-offline:hover {
            background: var(--accent);
            color: var(--deep-blue);
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--accent);
        }
        .btn-offline.primary {
            background: var(--accent);
            color: var(--deep-blue);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету.<br>Но вы всё ещё можете просматривать кэшированные данные.</p>
        <div class="btn-group">
            <button onclick="location.reload()" class="btn-offline primary">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
            <a href="/HomeWork/" class="btn-offline">
                <i class="fas fa-home"></i> На главную
            </a>
        </div>
    </div>
</body>
</html>
