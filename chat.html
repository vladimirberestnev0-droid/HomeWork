<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свой Мастер 86 — Чат</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#E67A4B">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ГЛАВНЫЙ CSS ФАЙЛ -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
</head>
<body>
    <div class="chat-container">
        <!-- Шапка чата -->
        <div class="chat-header">
            <a href="javascript:history.back()" class="chat-back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="chat-user-info">
                <div class="chat-user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="chat-user-text">
                    <div class="chat-user-name">
                        <span id="chatPartnerName">Загрузка...</span>
                        <span class="chat-order-ref" id="chatOrderRef"></span>
                    </div>
                    <div class="chat-user-status">
                        <span class="status-dot" id="userStatus"></span>
                        <span id="chatPartnerRole">Загрузка...</span>
                    </div>
                </div>
            </div>
            <div class="chat-header-actions">
                <button class="chat-header-btn" id="chatMenuBtn" title="Меню">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
        </div>

        <!-- Закреплённый заказ -->
        <div id="pinnedOrder" class="p-3 bg-soft border-bottom d-none">
            <small>
                <i class="fas fa-clipboard-list me-1 text-accent"></i>
                <span id="pinnedTitle"></span> · <span id="pinnedPrice"></span> ₽
            </small>
        </div>

        <!-- Сообщения -->
        <div id="messagesArea" class="messages-area"></div>

        <!-- Индикатор печатает... -->
        <div id="typingIndicator" class="typing-indicator d-none">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Поле ввода -->
        <div class="chat-footer">
            <input type="file" id="fileInput" style="display: none;" multiple accept="image/*,.pdf,.doc,.docx,.txt">
            <button class="chat-attach-btn" id="attachButton" title="Прикрепить файл">
                <i class="fas fa-paperclip"></i>
            </button>
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" class="chat-input" placeholder="Сообщение...">
            </div>
            <button class="chat-send-btn" id="sendButton" title="Отправить">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <!-- Превью файлов -->
        <div id="filePreview" class="file-preview-container d-none"></div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-item" data-page="search">
            <span class="nav-icon"><i class="fas fa-search"></i></span>
            <span class="nav-label">Поиск</span>
        </button>
        <button class="nav-item" data-page="favorites">
            <span class="nav-icon"><i class="fas fa-heart"></i></span>
            <span class="nav-label">Избранное</span>
        </button>
        <button class="nav-item" data-page="orders">
            <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>
            <span class="nav-label">Заказы</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon"><i class="fas fa-user"></i></span>
            <span class="nav-label">Профиль</span>
        </button>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    
    <!-- ВЫНЕСЕННЫЙ СКРИПТ ЧАТА -->
    <script src="/HomeWork/js/pages/chat.js"></script>
</body>
</html>
