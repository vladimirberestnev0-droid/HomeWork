<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>СВОЙ МАСТЕР 86 — Чат</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ГЛАВНЫЙ CSS ФАЙЛ -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
    <!-- ПРЕМИУМ-ТЕМА AURORA -->
    <link rel="stylesheet" href="/HomeWork/css/theme/theme-aurora.css">
</head>
<body>
    <!-- ===== СКЕЛЕТОН ЗАГРУЗКИ ===== -->
    <div id="loadingSkeleton" class="loading-skeleton" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-main); z-index: 10000; display: flex; align-items: center; justify-content: center;">
        <div class="text-center p-5">
            <div class="spinner-glow"></div>
            <p class="mt-3 text-secondary" id="loadingText">Загрузка чата...</p>
        </div>
    </div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ЧАТА (ИСПРАВЛЕННАЯ СТРУКТУРА) ===== -->
    <div class="chat-container" id="chatContainer" style="display: none;">
        
        <!-- ВЕРХНИЙ ТАЧБОРД (всегда приклеен к верху) -->
        <div class="chat-header">
            <button class="chat-back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="chat-user-info" id="chatUserInfo">
                <div class="chat-user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="chat-user-text">
                    <div class="chat-user-name">
                        <span id="chatPartnerName">Загрузка...</span>
                    </div>
                    <div class="chat-user-status">
                        <span class="status-dot" id="userStatus"></span>
                        <span id="chatPartnerRole">Загрузка...</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-header-actions">
                <button class="chat-header-btn" id="chatMenuBtn" title="Меню">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
            
            <!-- ВЫПАДАЮЩЕЕ МЕНЮ (Пункт 20) -->
            <div class="chat-menu-dropdown d-none" id="chatMenuDropdown">
                <div class="chat-menu-content">
                    <!-- Для клиента: выбрать мастера -->
                    <button class="chat-menu-item" id="selectMasterMenuItem" style="display: none;">
                        <i class="fas fa-check-circle"></i>
                        <span>Выбрать мастера</span>
                    </button>
                    
                    <!-- Для мастера: отказаться от заказа -->
                    <button class="chat-menu-item" id="cancelOrderMenuItem" style="display: none;">
                        <i class="fas fa-times-circle"></i>
                        <span>Отказаться от заказа</span>
                    </button>
                    
                    <!-- Для всех: пожаловаться -->
                    <button class="chat-menu-item" id="complaintMenuItem">
                        <i class="fas fa-flag"></i>
                        <span>Пожаловаться</span>
                    </button>
                    
                    <!-- Для всех: заблокировать -->
                    <button class="chat-menu-item" id="blockUserMenuItem">
                        <i class="fas fa-ban"></i>
                        <span>Заблокировать пользователя</span>
                    </button>
                    
                    <div class="chat-menu-divider"></div>
                    
                    <button class="chat-menu-item danger" id="closeMenuBtn">
                        <i class="fas fa-times"></i>
                        <span>Закрыть</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ИНФОРМАЦИЯ О ЗАКАЗЕ (Пункт 17) -->
        <div id="orderInfo" class="order-info-panel d-none">
            <div class="order-info-content">
                <i class="fas fa-clipboard-list"></i>
                <div class="order-info-text">
                    <div class="order-info-title" id="chatOrderTitle">Загрузка...</div>
                    <div class="order-info-price" id="chatOrderPrice">0 ₽</div>
                </div>
            </div>
        </div>

        <!-- ОБЛАСТЬ СООБЩЕНИЙ (скроллится) -->
        <div id="messagesArea" class="messages-area"></div>

        <!-- ИНДИКАТОР ПЕЧАТАЕТ... -->
        <div id="typingIndicator" class="typing-indicator d-none">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- НИЖНИЙ ТАЧБОРД (всегда приклеен к низу) -->
        <div class="chat-footer">
            <input type="file" id="fileInput" style="display: none;" multiple accept="image/*,.pdf,.doc,.docx,.txt">
            <button class="chat-attach-btn" id="attachButton" title="Прикрепить файл">
                <i class="fas fa-paperclip"></i>
            </button>
            
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" class="chat-input" placeholder="Сообщение...">
            </div>
            
            <button class="chat-send-btn" id="sendButton" title="Отправить">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <!-- ПРЕВЬЮ ФАЙЛОВ -->
        <div id="filePreview" class="file-preview-container d-none"></div>
    </div>

    <!-- Скрипты (те же, что и были) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 1. CORE -->
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/store.js"></script>
    <script src="/HomeWork/js/core/cache.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    
    <!-- 2. SERVICES -->
    <script src="/HomeWork/js/services/data-service.js"></script>
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/upload-service.js"></script>
    <script src="/HomeWork/js/services/orders-service.js"></script>
    <script src="/HomeWork/js/services/chat-service.js"></script>
    <script src="/HomeWork/js/services/push-service.js"></script>
    
    <!-- 3. COMPONENTS -->
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    
    <!-- 4. PAGE -->
    <script src="/HomeWork/js/pages/chat.js"></script>
</body>
</html>
