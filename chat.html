<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свой Мастер 86 — Чат</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#E67A4B">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/HomeWork/css/core/variables.css">
    <link rel="stylesheet" href="/HomeWork/css/core/base.css">
    <link rel="stylesheet" href="/HomeWork/css/core/utils.css">
    <link rel="stylesheet" href="/HomeWork/css/components/buttons.css">
    <link rel="stylesheet" href="/HomeWork/css/components/chat.css">
    <link rel="stylesheet" href="/HomeWork/css/themes/dark.css">
</head>
<body>
    <div class="chat-container">
        <!-- Шапка чата -->
        <div class="chat-header p-3 border-bottom d-flex align-items-center gap-3">
            <a href="javascript:history.back()" class="back-btn">
                <i class="fas fa-arrow-left fa-lg"></i>
            </a>
            <div class="chat-avatar">
                <i class="fas fa-user-circle fa-2x" style="color: var(--accent);"></i>
            </div>
            <div>
                <h5 id="chatPartnerName" class="mb-0">Загрузка...</h5>
                <small id="chatPartnerRole" class="text-secondary"></small>
            </div>
        </div>

        <!-- Закреплённый заказ -->
        <div id="pinnedOrder" class="p-2 bg-light border-bottom d-none">
            <small>
                <i class="fas fa-clipboard-list me-1"></i>
                <span id="pinnedTitle"></span> · <span id="pinnedPrice"></span> ₽
            </small>
        </div>

        <!-- Сообщения -->
        <div id="messagesArea" class="messages-area p-3" style="height: 60vh; overflow-y: auto;"></div>

        <!-- Поле ввода -->
        <div class="chat-input p-3 border-top">
            <div class="d-flex gap-2">
                <input type="file" id="fileInput" style="display: none;" multiple accept="image/*,.pdf">
                <button class="btn btn-outline-secondary" id="attachButton" title="Прикрепить файл">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="text" id="messageInput" class="form-control" placeholder="Сообщение...">
                <button class="btn btn-primary" id="sendButton">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div id="filePreview" class="d-flex gap-2 mt-2 flex-wrap d-none"></div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    
    <script src="/HomeWork/js/pages/chat.js"></script>
</body>
</html>
