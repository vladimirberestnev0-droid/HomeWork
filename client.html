<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>СВОЙ МАСТЕР 86 — Мои заказы</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/HomeWork/css/core/variables.css">
    <link rel="stylesheet" href="/HomeWork/css/core/base.css">
    <link rel="stylesheet" href="/HomeWork/css/core/utils.css">
    <link rel="stylesheet" href="/HomeWork/css/components/buttons.css">
    <link rel="stylesheet" href="/HomeWork/css/components/cards.css">
    <link rel="stylesheet" href="/HomeWork/css/components/forms.css">
    <link rel="stylesheet" href="/HomeWork/css/components/modals.css">
    <link rel="stylesheet" href="/HomeWork/css/responsive/mobile-fixes.css">
    <link rel="stylesheet" href="/HomeWork/css/responsive/desktop-fixes.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo">
                СВОЙ<span>86</span>
            </div>
            <button class="geo-tag" onclick="window.location.href='/HomeWork/'">
                <i class="fas fa-arrow-left"></i> На главную
            </button>
        </div>

        <!-- БЛОК АВТОРИЗАЦИИ -->
        <div id="authBlockContainer" class="mb-3"></div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div id="authRequired" class="text-center p-5 d-none">
            <i class="fas fa-user-circle fa-4x mb-3" style="color: var(--accent);"></i>
            <h3>Войдите в кабинет</h3>
            <button class="btn btn-primary mt-3" onclick="AuthUI.showLoginModal()">Войти</button>
        </div>

        <div id="clientCabinet" class="d-none">
            <!-- ПРОФИЛЬ -->
            <div class="card p-4 mb-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="master-avatar" style="width: 70px; height: 70px;">
                        <i class="fas fa-user fa-2x"></i>
                    </div>
                    <div>
                        <h4 id="clientName" class="mb-1">Загрузка...</h4>
                        <p class="text-secondary mb-1" id="clientEmail"></p>
                        <div class="master-rating" id="clientRating">★★★★★ 0.0</div>
                    </div>
                </div>
                <hr class="my-3" style="border-color: var(--border);">
                <div class="d-flex justify-content-around">
                    <div class="text-center">
                        <div class="fw-bold" id="clientOrdersCount">0</div>
                        <small class="text-muted">Заказов</small>
                    </div>
                    <div class="text-center">
                        <div class="fw-bold" id="clientReviews">0</div>
                        <small class="text-muted">Отзывов</small>
                    </div>
                </div>
            </div>

            <!-- ТАБЫ -->
            <div class="filters-scroll mb-4">
                <button class="filter-chip active" data-tab="orders">📋 Мои заказы</button>
                <button class="filter-chip" data-tab="chats">💬 Чаты</button>
            </div>

            <!-- ЗАКАЗЫ -->
            <div id="ordersTab" class="tab-content">
                <div class="filters-scroll mb-3">
                    <button class="filter-chip active" data-filter="all">Все</button>
                    <button class="filter-chip" data-filter="open">Активные</button>
                    <button class="filter-chip" data-filter="in_progress">В работе</button>
                    <button class="filter-chip" data-filter="completed">Завершённые</button>
                </div>
                <div id="ordersList" class="orders-list"></div>
            </div>

            <!-- ЧАТЫ -->
            <div id="chatsTab" class="tab-content d-none">
                <div id="chatsList" class="orders-list"></div>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home">
            <span>🏠</span>
            <span>Главная</span>
        </button>
        <button class="nav-item" data-page="search">
            <span>🔍</span>
            <span>Поиск</span>
        </button>
        <button class="nav-item" data-page="favorites">
            <span>❤️</span>
            <span>Избранное</span>
        </button>
        <button class="nav-item active" data-page="orders">
            <span>📋</span>
            <span>Заказы</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span>👤</span>
            <span>Профиль</span>
        </button>
    </div>

    <!-- МОДАЛКА ОТЗЫВА -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Оцените мастера</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="rating-stars mb-3">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                    </div>
                    <textarea id="reviewText" class="form-control" rows="3" placeholder="Ваш отзыв"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button class="btn btn-primary" id="submitReview">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    
    <script src="/HomeWork/js/pages/client.js"></script>
</body>
</html>
