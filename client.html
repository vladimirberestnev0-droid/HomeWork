<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>СВОЙ МАСТЕР 86 — Мои заказы</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ГЛАВНЫЙ CSS ФАЙЛ -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
    <!-- ПРЕМИУМ-ТЕМА AURORA -->
    <link rel="stylesheet" href="/HomeWork/css/themes/theme-aurora.css">
</head>
<body>
    <!-- ДЕСКТОПНАЯ НАВИГАЦИЯ -->
    <div class="desktop-nav">
        <div class="desktop-nav-container">
            <a href="/HomeWork/" class="desktop-nav-item" id="desktopNavHome">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="/HomeWork/client.html" class="desktop-nav-item active" id="desktopNavOrders">
                <i class="fas fa-clipboard-list"></i>
                <span>Мои заказы</span>
            </a>
            <a href="/HomeWork/masters.html" class="desktop-nav-item" id="desktopNavMasters">
                <i class="fas fa-user-tie"></i>
                <span>Мастера</span>
            </a>
            <a href="/HomeWork/client.html?tab=chats" class="desktop-nav-item requires-auth visible" id="desktopNavChats">
                <i class="fas fa-comments"></i>
                <span>Чаты</span>
            </a>
            <button class="desktop-nav-item create-btn" id="desktopCreateBtn">
                <i class="fas fa-plus-circle"></i>
                <span>Создать заказ</span>
            </button>
            <button class="desktop-nav-item auth-btn" id="desktopAuthBtn">
                <i class="fas fa-user-circle"></i>
                <span>Загрузка...</span>
            </button>
        </div>
    </div>

    <div class="app-wrapper">
        <!-- ШАПКА PREMIUM -->
        <div class="header-premium">
            <div class="logo-premium" onclick="window.location.href='/HomeWork/'">
                <span class="logo-premium-text">СВОЙ86</span>
                <span class="logo-premium-small">МОИ ЗАКАЗЫ</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="city-button-premium" onclick="window.location.href='/HomeWork/'">
                    <i class="fas fa-arrow-left"></i> На главную
                </button>
                <button class="btn btn-sm" id="logoutBtn" style="background: rgba(220,53,69,0.2); border: 1px solid rgba(220,53,69,0.3); color: #dc3545;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
                <button class="theme-toggle btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle" title="Сменить тему">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- БЛОК АВТОРИЗАЦИИ -->
        <div id="authBlockContainer" class="mb-3"></div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div id="authRequired" class="text-center p-5 d-none">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h4>Войдите в кабинет</h4>
                <p>Чтобы управлять заказами, нужно авторизоваться</p>
                <button class="btn btn-primary btn-lg px-5" onclick="AuthUI.showLoginModal()">
                    <i class="fas fa-sign-in-alt me-2"></i>Войти
                </button>
            </div>
        </div>

        <div id="clientCabinet" class="d-none">
            <!-- ПРОФИЛЬ PREMIUM -->
            <div class="order-card-premium p-4 mb-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="master-avatar-premium" style="width: 80px; height: 80px;">
                        <i class="fas fa-user fa-2x"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h4 id="clientName" class="mb-1" style="color: white;">Загрузка...</h4>
                        <p class="mb-1" id="clientEmail" style="color: var(--aurora-text-soft);"></p>
                        <div class="master-rating-premium" id="clientRating" style="justify-content: flex-start;">
                            <span class="stars">★★★★★</span>
                            <span class="rating-value">0.0</span>
                        </div>
                    </div>
                </div>
                <hr style="border-color: rgba(44,213,196,0.2); margin: 15px 0;">
                <div class="d-flex justify-content-around">
                    <div class="text-center">
                        <div class="fw-bold fs-4" style="color: var(--aurora-accent);" id="clientOrdersCount">0</div>
                        <small style="color: var(--aurora-text-muted);">Заказов</small>
                    </div>
                    <div class="text-center">
                        <div class="fw-bold fs-4" style="color: var(--aurora-accent);" id="clientReviews">0</div>
                        <small style="color: var(--aurora-text-muted);">Отзывов</small>
                    </div>
                    <div class="text-center">
                        <div class="fw-bold fs-4" style="color: var(--aurora-accent);" id="clientRating">0.0</div>
                        <small style="color: var(--aurora-text-muted);">Рейтинг</small>
                    </div>
                </div>
            </div>

            <!-- ТАБЫ PREMIUM -->
            <div class="filters-premium mb-4">
                <button class="filter-chip-premium active" data-tab="orders">
                    <i class="fas fa-clipboard-list me-1"></i>Мои заказы
                </button>
                <button class="filter-chip-premium" data-tab="chats">
                    <i class="fas fa-comments me-1"></i>Чаты
                    <span class="tab-badge d-none" id="chatsUnread">0</span>
                </button>
                <button class="filter-chip-premium" data-tab="new">
                    <i class="fas fa-plus-circle me-1"></i>Создать
                </button>
            </div>

            <!-- ЗАКАЗЫ -->
            <div id="ordersTab" class="tab-content">
                <div class="filters-premium mb-3">
                    <button class="filter-chip-premium active" data-filter="all">Все</button>
                    <button class="filter-chip-premium" data-filter="open">Активные</button>
                    <button class="filter-chip-premium" data-filter="in_progress">В работе</button>
                    <button class="filter-chip-premium" data-filter="completed">Завершённые</button>
                </div>
                <div id="ordersList" class="orders-list"></div>
            </div>

            <!-- ЧАТЫ -->
            <div id="chatsTab" class="tab-content d-none">
                <div id="chatsList" class="orders-list"></div>
            </div>

            <!-- СОЗДАНИЕ ЗАКАЗА PREMIUM -->
            <div id="newTab" class="tab-content d-none">
                <div class="order-card-premium p-4">
                    <h5 class="mb-4" style="color: white;">Создать новый заказ</h5>
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Категория</label>
                        <select class="form-control" id="orderCategory" style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;">
                            <option value="">Выберите категорию</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Название</label>
                        <input type="text" class="form-control" id="orderTitle" 
                               placeholder="Например: Замена смесителя" maxlength="100"
                               style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Описание</label>
                        <textarea class="form-control" id="orderDescription" 
                                  rows="3" placeholder="Опишите задачу подробнее" maxlength="1000"
                                  style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Цена</label>
                        <div class="price-input-wrapper">
                            <input type="number" class="form-control" id="orderPrice" 
                                   placeholder="1500" min="500" max="1000000" step="100"
                                   style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;">
                            <span class="currency" style="color: var(--aurora-accent);">₽</span>
                        </div>
                        <small style="color: var(--aurora-text-muted);">от 500 до 1 000 000 ₽</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Адрес</label>
                        <input type="text" class="form-control" id="orderAddress" 
                               placeholder="ул. Ленина, д. 10, кв. 5" maxlength="200"
                               style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Фотографии (до 5 шт)</label>
                        <div class="file-input-wrapper">
                            <input type="file" class="file-input" id="orderPhotos" 
                                   multiple accept="image/*">
                            <label for="orderPhotos" class="file-label" id="uploadPhotoBtn" 
                                   style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: var(--aurora-text-soft);">
                                <i class="fas fa-camera me-2"></i>Загрузить фото
                            </label>
                        </div>
                        <div id="photoPreview" class="d-flex gap-2 mt-2 flex-wrap"></div>
                    </div>
                    
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="orderUrgent">
                        <label class="form-check-label" for="orderUrgent" style="color: var(--aurora-text-soft);">
                            <i class="fas fa-exclamation-circle me-1" style="color: #FF8A5C;"></i>
                            Срочный заказ
                        </label>
                    </div>
                    
                    <button class="btn w-100" id="createOrderSubmit" 
                            style="background: var(--aurora-accent); color: var(--aurora-deep); font-weight: 700; padding: 15px;">
                        <i class="fas fa-paper-plane me-2"></i>Создать заказ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-item" data-page="search">
            <span class="nav-icon"><i class="fas fa-search"></i></span>
            <span class="nav-label">Поиск</span>
        </button>
        <button class="nav-item create-order-btn" data-page="create-order">
            <span class="plus-icon"><i class="fas fa-plus-circle"></i></span>
            <span>Заявка</span>
        </button>
        <button class="nav-item active" data-page="orders">
            <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>
            <span class="nav-label">Мои заказы</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon"><i class="fas fa-user"></i></span>
            <span class="nav-label">Профиль</span>
        </button>
    </div>

    <!-- МОДАЛКА ОТЗЫВА -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-star me-2" style="color: gold;"></i>
                        Оцените мастера
                    </h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="rating-stars mb-3 text-center" id="reviewStars">
                        <span class="star" data-rating="1">☆</span>
                        <span class="star" data-rating="2">☆</span>
                        <span class="star" data-rating="3">☆</span>
                        <span class="star" data-rating="4">☆</span>
                        <span class="star" data-rating="5">☆</span>
                    </div>
                    <textarea id="reviewText" class="form-control" rows="3" 
                              placeholder="Ваш отзыв (необязательно)"
                              style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button class="btn btn-primary" id="submitReview">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    
    <!-- 2. SERVICES (исправлено) -->
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders-service.js"></script>
    <script src="/HomeWork/js/services/chat-service.js"></script>
    
    <!-- 3. COMPONENTS -->
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    <script src="/HomeWork/js/components/notifications.js"></script>
    
    <!-- 4. PAGE -->
    <script src="/HomeWork/js/pages/client.js"></script>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Переключение табов
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('d-none'));
                document.getElementById(tab + 'Tab').classList.remove('d-none');
            });
        });
        
        document.querySelectorAll('[data-filter]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // Здесь твой скрипт фильтрации заказов
                if (window.Orders && typeof Orders.filterByStatus === 'function') {
                    Orders.filterByStatus(this.dataset.filter);
                }
            });
        });
    });
    </script>
</body>
</html>
