<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>СВОЙ МАСТЕР 86 — мастера рядом</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <!-- Open Graph -->
    <meta property="og:title" content="СВОЙ МАСТЕР 86">
    <meta property="og:description" content="Найдите проверенных мастеров рядом">
    <meta property="og:image" content="/HomeWork/icons/og-image.jpg">
    <meta property="og:url" content="https://svoymaster86.ru">
    
    <!-- PWA -->
    <link rel="apple-touch-icon" href="/HomeWork/icons/icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ГЛАВНЫЙ CSS ФАЙЛ -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
    <!-- ПРЕМИУМ-ТЕМА AURORA -->
    <link rel="stylesheet" href="/HomeWork/css/themes/theme-aurora.css">
    
    <style>
        /* Временные стили для плавного перехода - можно удалить после проверки */
        .header, .search-bar, .filters-scroll, .section-title, 
        .floating-action, .bottom-nav {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>
    <!-- ДЕСКТОПНАЯ НАВИГАЦИЯ (оставляем без изменений) -->
    <div class="desktop-nav">
        <div class="desktop-nav-container">
            <!-- Главная -->
            <a href="/HomeWork/" class="desktop-nav-item" id="desktopNavHome">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            
            <!-- Заказы -->
            <a href="/HomeWork/orders.html" class="desktop-nav-item" id="desktopNavOrders">
                <i class="fas fa-clipboard-list"></i>
                <span>Заказы</span>
            </a>
            
            <!-- Мастера -->
            <a href="/HomeWork/masters.html" class="desktop-nav-item" id="desktopNavMasters">
                <i class="fas fa-user-tie"></i>
                <span>Мастера</span>
            </a>
            
            <!-- Чаты (скрыты для гостя) -->
            <a href="#" class="desktop-nav-item requires-auth" id="desktopNavChats" style="display: none;">
                <i class="fas fa-comments"></i>
                <span>Чаты</span>
            </a>
            
            <!-- Создать заказ -->
            <button class="desktop-nav-item create-btn" id="desktopCreateBtn">
                <i class="fas fa-plus-circle"></i>
                <span>Создать заказ</span>
            </button>
            
            <!-- Вход/Профиль -->
            <button class="desktop-nav-item auth-btn" id="desktopAuthBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Войти</span>
            </button>
        </div>
    </div>

    <div class="app-wrapper">
        <!-- ===== ШАПКА PREMIUM ===== -->
        <div class="header-premium">
            <div class="logo-premium" onclick="window.location.href='/HomeWork/'">
                <span class="logo-premium-text">СВОЙ86</span>
                <span class="logo-premium-small">МАСТЕР</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="city-button-premium" id="citySelector">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="selectedCity">Нягань</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <button class="theme-toggle btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle" title="Сменить тему">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- ===== ПОИСК PREMIUM ===== -->
        <div class="search-premium">
            <div class="search-glass">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск мастеров или услуг...">
                <button id="searchButton"><i class="fas fa-arrow-right"></i></button>
                <span class="clear-search" id="clearSearch" style="display: none;"><i class="fas fa-times"></i></span>
            </div>
        </div>

        <!-- БЛОК АВТОРИЗАЦИИ -->
        <div id="authBlockContainer" class="mb-3"></div>

        <!-- СКЕЛЕТОН ЗАГРУЗКИ -->
        <div id="loadingSkeleton" class="loading-skeleton">
            <div class="filters-premium">
                <div class="skeleton-chip"></div>
                <div class="skeleton-chip"></div>
                <div class="skeleton-chip"></div>
                <div class="skeleton-chip"></div>
            </div>
            <div class="skeleton-order"></div>
            <div class="skeleton-order"></div>
            <div class="skeleton-order"></div>
            <div class="skeleton-order"></div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div id="mainContent" style="display: none;">
            <!-- ===== ФИЛЬТРЫ PREMIUM ===== -->
            <div class="filters-premium" id="categoryFilters"></div>

            <!-- ===== СВЕЖИЕ ЗАКАЗЫ PREMIUM ===== -->
            <div class="section-title-premium">
                <h2>
                    <i class="fas fa-fire"></i> 
                    Свежие заказы
                </h2>
                <div class="d-flex align-items-center gap-2">
                    <select class="form-select form-select-sm" id="sortSelect" style="width: auto; background: rgba(26,44,62,0.6); color: white; border-color: rgba(44,213,196,0.3);">
                        <option value="newest">Сначала новые</option>
                        <option value="price_asc">Сначала дешевле</option>
                        <option value="price_desc">Сначала дороже</option>
                    </select>
                    <span id="ordersCount" class="badge" style="background: var(--aurora-accent); color: var(--aurora-deep);">0</span>
                </div>
            </div>

            <div id="ordersList" class="orders-list"></div>

            <!-- ===== МАСТЕРА PREMIUM ===== -->
            <div class="section-title-premium">
                <h2>
                    <i class="fas fa-crown"></i> 
                    Мастера рядом
                </h2>
                <a href="/HomeWork/masters.html" class="nav-link" id="allMastersLink">Все <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="masters-scroll" id="mastersList"></div>

            <!-- ===== ПЛАВАЮЩАЯ КНОПКА PREMIUM ===== -->
            <div class="floating-action">
                <button class="btn-floating" id="createOrderBtn">
                    <i class="fas fa-plus-circle"></i> Подать заявку
                </button>
            </div>
        </div>
    </div>

    <!-- ===== МОБИЛЬНАЯ НАВИГАЦИЯ PREMIUM ===== -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-item" data-page="search" style="display: none;">
            <span class="nav-icon"><i class="fas fa-search"></i></span>
            <span class="nav-label">Поиск</span>
        </button>
        <button class="nav-item" data-page="chats" style="display: none;">
            <span class="nav-icon"><i class="fas fa-comments"></i></span>
            <span class="nav-label">Чаты</span>
            <span class="nav-badge hidden" id="chatsNavBadge">0</span>
        </button>
        <button class="nav-item create-order-btn" data-page="create-order">
            <span class="plus-icon"><i class="fas fa-plus-circle"></i></span>
            <span>Заявка</span>
        </button>
        <button class="nav-item" data-page="orders" style="display: none;">
            <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>
            <span class="nav-label">Заказы</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon"><i class="fas fa-user"></i></span>
            <span class="nav-label">Профиль</span>
        </button>
    </div>

    <!-- МОДАЛКА АВТОРИЗАЦИИ -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="authModalTitle">Вход</h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body" id="authModalBody"></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ВЫБОРА ГОРОДА -->
    <div class="modal fade" id="cityModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-map-marker-alt me-2" style="color: var(--aurora-accent);"></i>
                        Выберите город
                    </h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="list-group" id="cityList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ОТКЛИКА -->
    <div class="modal fade" id="respondModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-reply me-2" style="color: var(--aurora-accent);"></i>
                        Откликнуться на заказ
                    </h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="respondOrderInfo" class="bg-soft p-3 rounded-4 mb-4" style="background: rgba(44,213,196,0.1) !important; border: 1px solid rgba(44,213,196,0.2);">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-bold" id="respondOrderTitle" style="color: white;">Заказ</div>
                                <small class="text-secondary" id="respondOrderCategory" style="color: var(--aurora-text-soft) !important;">Категория</small>
                            </div>
                            <span class="badge" style="background: var(--aurora-accent); color: var(--aurora-deep);" id="respondOrderPrice">0 ₽</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label required" style="color: var(--aurora-text-soft);">Ваша цена</label>
                        <div class="price-input-wrapper">
                            <input type="number" class="form-control form-control-lg" id="responsePrice" 
                                   placeholder="1500" min="500" max="1000000" step="100"
                                   style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;">
                            <span class="currency" style="color: var(--aurora-accent);">₽</span>
                        </div>
                        <small class="text-secondary" style="color: var(--aurora-text-muted) !important;">от 500 до 1 000 000 ₽</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" style="color: var(--aurora-text-soft);">Комментарий</label>
                        <textarea class="form-control" id="responseComment" rows="3" 
                                  placeholder="Расскажите, как будете выполнять работу..." maxlength="500"
                                  style="background: rgba(26,44,62,0.6); border-color: rgba(44,213,196,0.3); color: white;"></textarea>
                        <small class="text-secondary" style="color: var(--aurora-text-muted) !important;">Максимум 500 символов</small>
                    </div>

                    <div class="alert d-flex align-items-center gap-2 mb-0" style="background: rgba(44,213,196,0.1); border: 1px solid rgba(44,213,196,0.2); color: var(--aurora-text-soft);">
                        <i class="fas fa-info-circle" style="color: var(--aurora-accent);"></i>
                        <small>Клиент увидит вашу цену и комментарий. Будьте вежливы!</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" style="border-color: rgba(44,213,196,0.3); color: var(--aurora-text-soft);">Отмена</button>
                    <button type="button" class="btn" id="submitResponse" style="background: var(--aurora-accent); color: var(--aurora-deep); font-weight: 700;">Отправить отклик</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ВЫПАДАЮЩИЙ СПИСОК КАТЕГОРИЙ (для десктопа) -->
    <div class="category-dropdown d-none" id="categoryDropdown">
        <div class="category-list" id="categoryList"></div>
        <div class="category-actions">
            <button class="btn btn-outline-secondary" id="cancelCategory">Отмена</button>
            <button class="btn btn-primary" id="applyCategory">Применить</button>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    <script src="/HomeWork/js/services/moderation.js"></script>
    
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    <script src="/HomeWork/js/components/desktop-nav.js"></script>
    <script src="/HomeWork/js/components/notifications.js"></script>
    
    <script src="/HomeWork/js/pages/index.js"></script>
    
    <script>
        // Небольшой фикс для clear-search (чтобы работал с новой структурой)
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearch');
            
            if (searchInput && clearBtn) {
                searchInput.addEventListener('input', function() {
                    if (this.value.length > 0) {
                        clearBtn.style.display = 'inline-block';
                    } else {
                        clearBtn.style.display = 'none';
                    }
                });
                
                clearBtn.addEventListener('click', function() {
                    searchInput.value = '';
                    clearBtn.style.display = 'none';
                    searchInput.focus();
                });
            }
            
            // Активация навигации
            const currentPage = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (currentPage.includes('index') || currentPage === '/HomeWork/' || currentPage.endsWith('/')) {
                    if (item.dataset.page === 'home') {
                        item.classList.add('active');
                    }
                }
            });
            
            document.querySelectorAll('.desktop-nav-item').forEach(item => {
                const href = item.getAttribute('href');
                if (href && (currentPage.includes(href) || 
                    (currentPage === '/HomeWork/' && href.includes('index')))) {
                    item.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
