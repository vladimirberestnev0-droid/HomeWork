<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>СВОЙ МАСТЕР 86 — мастера рядом</title>
    
    <!-- PWA -->
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Наши стили -->
    <link rel="stylesheet" href="/HomeWork/css/core/variables.css">
    <link rel="stylesheet" href="/HomeWork/css/core/base.css">
    <link rel="stylesheet" href="/HomeWork/css/core/utils.css">
    <link rel="stylesheet" href="/HomeWork/css/components/buttons.css">
    <link rel="stylesheet" href="/HomeWork/css/components/cards.css">
    <link rel="stylesheet" href="/HomeWork/css/components/forms.css">
    <link rel="stylesheet" href="/HomeWork/css/components/filters.css">
    <link rel="stylesheet" href="/HomeWork/css/components/masters.css">
    <link rel="stylesheet" href="/HomeWork/css/components/dropdown.css">
    <link rel="stylesheet" href="/HomeWork/css/components/modals.css">
    <link rel="stylesheet" href="/HomeWork/css/components/loaders.css">
    <link rel="stylesheet" href="/HomeWork/css/responsive/mobile-fixes.css">
    <link rel="stylesheet" href="/HomeWork/css/responsive/desktop-fixes.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo">
                СВОЙ<span>86</span>
            </div>
            <div class="geo-tag">
                <i class="fas fa-map-marker-alt"></i> ХМАО, Нягань
            </div>
        </div>

        <!-- ПОИСК -->
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Поиск мастеров или услуг...">
        </div>

        <!-- БЛОК АВТОРИЗАЦИИ -->
        <div id="authBlockContainer" class="mb-3"></div>

        <!-- СКЕЛЕТОН ЗАГРУЗКИ -->
        <div id="loadingSkeleton" class="loading-skeleton">
            <div class="filters-scroll">
                <div class="skeleton-chip"></div>
                <div class="skeleton-chip"></div>
                <div class="skeleton-chip"></div>
            </div>
            <div class="skeleton-order"></div>
            <div class="skeleton-order"></div>
            <div class="skeleton-order"></div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div id="mainContent">
            <!-- ФИЛЬТРЫ (скроллящиеся) -->
            <div class="filters-scroll" id="categoryFilters">
                <!-- JS заполнит -->
            </div>

            <!-- БЛОК: СВЕЖИЕ ЗАКАЗЫ -->
            <div class="section-title">
                <h2><i class="fas fa-fire" style="color: var(--accent);"></i> Свежие заказы</h2>
                <a href="#" id="viewAllOrders">Все <span id="ordersCount">0</span> →</a>
            </div>

            <div id="ordersList" class="orders-list">
                <!-- JS заполнит -->
            </div>

            <!-- БЛОК: ПОПУЛЯРНЫЕ МАСТЕРА -->
            <div class="section-title">
                <h2><i class="fas fa-crown" style="color: var(--accent);"></i> Мастера рядом</h2>
                <a href="/HomeWork/masters.html">Все →</a>
            </div>

            <div class="masters-scroll" id="mastersList">
                <!-- JS заполнит -->
            </div>

            <!-- ПЛАВАЮЩАЯ КНОПКА -->
            <div class="floating-action">
                <button class="btn-floating" id="createOrderBtn">
                    <i class="fas fa-plus-circle"></i> Подать заявку
                </button>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <span>🏠</span>
            <span>Главная</span>
        </button>
        <button class="nav-item" data-page="search">
            <span>🔍</span>
            <span>Поиск</span>
        </button>
        <button class="nav-item" data-page="favorites">
            <span>❤️</span>
            <span>Избранное</span>
        </button>
        <button class="nav-item" data-page="orders">
            <span>📋</span>
            <span>Заказы</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span>👤</span>
            <span>Профиль</span>
        </button>
    </div>

    <!-- МОДАЛКА АВТОРИЗАЦИИ -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="authModalTitle">Вход</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="authModalBody"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты (ВАЖНО: строгий порядок!) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core -->
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <!-- Services -->
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    <script src="/HomeWork/js/services/moderation.js"></script>
    
    <!-- Components -->
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    
    <!-- Pages -->
    <script src="/HomeWork/js/pages/index.js"></script>
</body>
</html>
