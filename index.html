<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВоркХом — Главная</title>
    
    <!-- PWA -->
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#E67A4B">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/HomeWork/css/core/variables.css">
    <link rel="stylesheet" href="/HomeWork/css/core/base.css">
    <link rel="stylesheet" href="/HomeWork/css/core/utils.css">
    <link rel="stylesheet" href="/HomeWork/css/components/buttons.css">
    <link rel="stylesheet" href="/HomeWork/css/components/cards.css">
    <link rel="stylesheet" href="/HomeWork/css/components/forms.css">
    <link rel="stylesheet" href="/HomeWork/css/components/modals.css">
    <link rel="stylesheet" href="/HomeWork/css/themes/dark.css">
</head>
<body>
    <div class="container py-4">
        <!-- Шапка -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <a href="/HomeWork/" class="logo-link d-flex align-items-center gap-2">
                <i class="fas fa-house" style="color: var(--accent); font-size: 28px;"></i>
                <span class="fw-bold fs-4">Свой Мастер 86</span>
            </a>
            <nav class="d-flex gap-3 align-items-center">
                <a href="/HomeWork/" class="active fw-medium">Главная</a>
                <a href="/HomeWork/client.html" id="clientLink">Мои заказы</a>
                <a href="/HomeWork/masters.html" id="masterLink">Мастерам</a>
                <button class="btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="headerLogoutBtn" class="btn btn-sm btn-outline-danger rounded-pill d-none">
                    <i class="fas fa-sign-out-alt me-1"></i> Выйти
                </button>
            </nav>
        </header>

        <!-- Блок авторизации -->
        <div id="authBlockContainer" class="mb-4"></div>

        <!-- Фильтр по городам (упрощённый select) -->
        <div class="filter-section mb-4">
            <label class="form-label fw-bold mb-2">
                <i class="fas fa-map-marker-alt me-1" style="color: var(--accent);"></i>
                Город
            </label>
            <select id="cityFilter" class="form-select">
                <option value="all">Все города</option>
                <option value="nyagan">Нягань</option>
                <option value="surgut">Сургут</option>
                <option value="khanty-mansiysk">Ханты-Мансийск</option>
            </select>
        </div>

        <!-- Фильтр по категориям -->
        <div class="filter-section mb-4">
            <label class="form-label fw-bold mb-2">
                <i class="fas fa-tags me-1" style="color: var(--accent);"></i>
                Категория
            </label>
            <div id="categoryFilter" class="d-flex flex-wrap gap-2"></div>
        </div>

        <!-- Основной контейнер: форма + заказы -->
        <div class="row g-4">
            <!-- Левая колонка: форма создания заказа (для клиентов) -->
            <div id="orderFormColumn" class="col-md-6">
                <div class="card p-4">
                    <h3 class="mb-4">
                        <i class="fas fa-plus-circle me-2" style="color: var(--accent);"></i>
                        Новая заявка
                    </h3>
                    <form id="orderForm">
                        <div class="mb-3">
                            <label class="form-label">Категория <span class="text-danger">*</span></label>
                            <select class="form-select" id="category" required>
                                <option value="">Выберите категорию</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Название работы <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" required minlength="5">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Бюджет (₽) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="price" required min="500" max="1000000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Адрес <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Фото (до 5 шт)</label>
                            <input type="file" id="photoInput" accept="image/*" multiple class="form-control">
                            <div id="photoPreview" class="d-flex gap-2 mt-2 flex-wrap"></div>
                        </div>
                        <button type="submit" class="btn w-100 py-3">
                            <i class="fas fa-paper-plane me-2"></i> Опубликовать заказ
                        </button>
                    </form>
                </div>
            </div>

            <!-- Правая колонка: список заказов -->
            <div id="ordersColumn" class="col-md-6">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="mb-0">
                            <i class="fas fa-clipboard-list me-2" style="color: var(--accent);"></i>
                            Актуальные заказы
                        </h3>
                        <span class="badge bg-secondary" id="ordersCount">0</span>
                    </div>
                    <div id="ordersList"></div>
                    <div id="loadMoreContainer" class="text-center mt-4 d-none">
                        <button id="loadMoreBtn" class="btn btn-outline-secondary">
                            Показать ещё <span id="remainingOrdersCount">0</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка авторизации -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--accent); color: white;">
                    <h5 class="modal-title" id="authModalTitle">Вход</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="authModalBody"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <footer class="mt-5 py-4 text-center text-secondary border-top">
        <p>&copy; 2026 Свой Мастер 86 — ремонт и строительство в Нягани</p>
    </footer>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core -->
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <!-- Services -->
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/moderation.js"></script>
    
    <!-- Components -->
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    
    <!-- Pages -->
    <script src="/HomeWork/js/pages/index.js"></script>
</body>
</html>
