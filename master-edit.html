<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СВОЙ МАСТЕР 86 — Редактирование</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#2CD5C4">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
    <link rel="stylesheet" href="/HomeWork/css/theme/theme-aurora.css">
</head>
<body>
    <!-- ДЕСКТОПНАЯ НАВИГАЦИЯ -->
    <div class="desktop-nav">
        <div class="desktop-nav-container">
            <a href="/HomeWork/" class="desktop-nav-item" id="desktopNavHome">
                <i class="fas fa-home"></i><span>Главная</span>
            </a>
            <a href="/HomeWork/client.html" class="desktop-nav-item" id="desktopNavOrders">
                <i class="fas fa-clipboard-list"></i><span>Заказы</span>
            </a>
            <a href="/HomeWork/masters.html" class="desktop-nav-item" id="desktopNavMasters">
                <i class="fas fa-user-tie"></i><span>Мастера</span>
            </a>
            <a href="#" class="desktop-nav-item requires-auth" id="desktopNavChats" style="display: none;">
                <i class="fas fa-comments"></i><span>Чаты</span>
            </a>
            <button class="desktop-nav-item create-btn" id="desktopCreateBtn">
                <i class="fas fa-plus-circle"></i><span>Создать заказ</span>
            </button>
            <button class="desktop-nav-item auth-btn" id="desktopAuthBtn">
                <i class="fas fa-sign-in-alt"></i><span>Войти</span>
            </button>
        </div>
    </div>

    <!-- ШАПКА -->
    <div class="header-premium">
        <div class="logo-premium" onclick="window.location.href='/HomeWork/'">
            <span class="logo-premium-text">СВОЙ86</span>
            <span class="logo-premium-small">РЕДАКТИРОВАНИЕ</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button class="city-button-premium" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Назад
            </button>
            <button class="theme-toggle btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="app-wrapper">
        <div class="edit-profile">
            <h2 class="mb-4">Редактировать профиль</h2>
            
            <!-- АВАТАР -->
            <div class="avatar-upload">
                <img id="avatarPreview" src="https://via.placeholder.com/150" alt="Avatar">
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                <button class="btn btn-outline" id="changeAvatarBtn">
                    <i class="fas fa-camera"></i> Изменить фото
                </button>
            </div>

            <!-- ОСНОВНАЯ ИНФОРМАЦИЯ -->
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="editName" maxlength="50" placeholder="Иван Петров">
            </div>

            <div class="form-group">
                <label>О себе</label>
                <textarea id="editAbout" rows="5" maxlength="500" 
                          placeholder="Расскажите о своём опыте..."></textarea>
                <small>Максимум 500 символов</small>
            </div>

            <div class="form-group">
                <label>Специализация (через запятую)</label>
                <input type="text" id="editSpecializations" 
                       placeholder="Сантехника, Электрика, Ремонт">
            </div>

            <div class="form-group">
                <label>Город</label>
                <select id="editCity">
                    <option value="nyagan">Нягань</option>
                    <option value="surgut">Сургут</option>
                    <option value="khanty-mansiysk">Ханты-Мансийск</option>
                    <option value="nefteyugansk">Нефтеюганск</option>
                    <option value="nizhnevartovsk">Нижневартовск</option>
                </select>
            </div>

            <div class="form-group">
                <label>Район/ориентир</label>
                <input type="text" id="editAddress" placeholder="Центральный район">
            </div>

            <div class="form-group">
                <label>Опыт работы (лет)</label>
                <input type="number" id="editExperience" min="0" max="70" value="0">
            </div>

            <div class="form-group">
                <label>Гарантия</label>
                <input type="text" id="editGuarantee" placeholder="Например: гарантия 1 год">
            </div>

            <!-- ГРАФИК РАБОТЫ -->
            <h3 class="mt-4 mb-3">График работы</h3>
            <div class="schedule-grid" id="scheduleGrid">
                <!-- Заполняется через JS -->
            </div>

            <!-- ПОРТФОЛИО -->
            <h3 class="mt-4 mb-3">Портфолио</h3>
            <div class="portfolio-upload">
                <div class="portfolio-list" id="portfolioList"></div>
                <button class="btn btn-outline" id="addPortfolioBtn">
                    <i class="fas fa-plus"></i> Добавить фото
                </button>
                <input type="file" id="portfolioInput" multiple accept="image/*" style="display: none;">
            </div>

            <!-- КНОПКИ -->
            <div class="form-actions">
                <button class="btn btn-primary" id="saveProfileBtn">
                    <i class="fas fa-save"></i> Сохранить
                </button>
                <button class="btn btn-outline" id="cancelEditBtn">
                    <i class="fas fa-times"></i> Отмена
                </button>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home"><i class="fas fa-home"></i><span>Главная</span></button>
        <button class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Поиск</span></button>
        <button class="nav-item create-order-btn" data-page="create-order">
            <i class="fas fa-plus-circle"></i><span>Заявка</span>
        </button>
        <button class="nav-item" data-page="orders"><i class="fas fa-clipboard-list"></i><span>Заказы</span></button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 1. CORE -->
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/store.js"></script>
    <script src="/HomeWork/js/core/cache.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <!-- 2. SERVICES -->
    <script src="/HomeWork/js/services/data-service.js"></script>
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/upload-service.js"></script>
    <script src="/HomeWork/js/services/orders-service.js"></script>
    <script src="/HomeWork/js/services/chat-service.js"></script>
    
    <!-- 3. PAGE -->
    <script src="/HomeWork/js/pages/master-edit.js"></script>
</body>
</html>
