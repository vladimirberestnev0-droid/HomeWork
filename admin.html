<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свой Мастер 86 — Админ-панель</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#E67A4B">
    
    <!-- Библиотеки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ГЛАВНЫЙ CSS ФАЙЛ (все стили в одном) -->
    <link rel="stylesheet" href="/HomeWork/css/main.css">
</head>
<body>
    <!-- ===== ЗАЩИТА АДМИНКИ ===== -->
    <script>
    (function() {
        // Проверяем авторизацию ДО загрузки страницы
        const checkAdmin = function() {
            // Если Auth уже загружен
            if (window.Auth && typeof Auth.isAdmin === 'function') {
                if (!Auth.isAdmin()) {
                    showAccessDenied();
                }
                return;
            }
            
            // Ждём загрузки Auth максимум 3 секунды
            let attempts = 0;
            const maxAttempts = 30;
            
            const interval = setInterval(() => {
                attempts++;
                
                if (window.Auth && typeof Auth.isAdmin === 'function') {
                    clearInterval(interval);
                    if (!Auth.isAdmin()) {
                        showAccessDenied();
                    }
                } else if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    showAccessDenied();
                }
            }, 100);
        };
        
        function showAccessDenied() {
            document.body.innerHTML = '';
            document.body.style.margin = '0';
            document.body.style.background = 'var(--deep-blue, #0B1E33)';
            
            document.body.innerHTML = `
                <div style="position:fixed; top:0; left:0; right:0; bottom:0; background:var(--deep-blue, #0B1E33); display:flex; align-items:center; justify-content:center; z-index:9999;">
                    <div style="text-align:center; padding:20px; max-width:400px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:64px; color:var(--accent-urgent, #FF8A5C); margin-bottom:20px; display:block;"></i>
                        <h3 style="color:white; font-size:24px; margin-bottom:15px; font-family: 'Inter', sans-serif;">Доступ запрещён</h3>
                        <p style="color:var(--text-soft, #B0C4D9); margin-bottom:25px; font-size:16px; line-height:1.5;">Только администратор может войти в этот раздел</p>
                        <a href="/HomeWork/" style="background:var(--accent, #2CD5C4); color:var(--deep-blue, #0B1E33); padding:12px 30px; border-radius:60px; text-decoration:none; font-weight:700; display:inline-block; font-family: 'Inter', sans-serif;">
                            <i class="fas fa-home me-2"></i>На главную
                        </a>
                    </div>
                </div>
            `;
            
            window.stop();
        }
        
        checkAdmin();
    })();
    </script>

    <div class="container py-4" id="adminContent" style="display: none;">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <a href="/HomeWork/" class="logo-link d-flex align-items-center gap-2 text-decoration-none">
                <i class="fas fa-shield-alt" style="color: var(--accent); font-size: 24px;"></i>
                <span class="fw-bold" style="color: var(--text-primary); font-size: 20px;">Свой Мастер 86 Админ</span>
            </a>
            <nav class="d-flex gap-3">
                <a href="/HomeWork/" class="text-decoration-none" style="color: var(--text-secondary);">Главная</a>
                <a href="/HomeWork/admin.html" class="text-decoration-none" style="color: var(--accent); font-weight:600;">Админ-панель</a>
                <button class="btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="#" id="logoutLink" class="btn btn-sm btn-outline-danger rounded-pill">
                    <i class="fas fa-sign-out-alt me-1"></i> Выйти
                </a>
            </nav>
        </header>

        <!-- Статистика -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-users fa-2x mb-2" style="color: var(--accent);"></i>
                    <h5 id="statUsers">0</h5>
                    <p class="text-secondary">Пользователей</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-user-tie fa-2x mb-2" style="color: var(--accent);"></i>
                    <h5 id="statMasters">0</h5>
                    <p class="text-secondary">Мастеров</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-clipboard-list fa-2x mb-2" style="color: var(--accent);"></i>
                    <h5 id="statOrders">0</h5>
                    <p class="text-secondary">Заказов</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-exclamation-triangle fa-2x mb-2" style="color: #dc3545;"></i>
                    <h5 id="statComplaints">0</h5>
                    <p class="text-secondary">Жалоб</p>
                </div>
            </div>
        </div>

        <!-- Табы -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <button class="nav-link active" data-tab="users">Пользователи</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="orders">Заказы</button>
            </li>
        </ul>

        <!-- Таб: Пользователи -->
        <div id="usersTab" class="tab-content">
            <input type="text" class="form-control mb-3" id="userSearch" placeholder="🔍 Поиск по имени или email...">
            <div id="usersList" class="users-list"></div>
        </div>

        <!-- Таб: Заказы -->
        <div id="ordersTab" class="tab-content d-none">
            <div id="adminOrdersList" class="orders-list"></div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ (скрыта на десктопе) -->
    <div class="bottom-nav d-md-none">
        <button class="nav-item" data-page="home">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-item" data-page="search">
            <span class="nav-icon"><i class="fas fa-search"></i></span>
            <span class="nav-label">Поиск</span>
        </button>
        <button class="nav-item" data-page="favorites">
            <span class="nav-icon"><i class="fas fa-heart"></i></span>
            <span class="nav-label">Избранное</span>
        </button>
        <button class="nav-item" data-page="orders">
            <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>
            <span class="nav-label">Заказы</span>
        </button>
        <button class="nav-item active" data-page="profile">
            <span class="nav-icon"><i class="fas fa-user"></i></span>
            <span class="nav-label">Профиль</span>
        </button>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    <script src="/HomeWork/js/core/loader.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    <script src="/HomeWork/js/services/chat.js"></script>
    
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    
    <script src="/HomeWork/js/pages/admin.js"></script>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            if (window.Auth && Auth.isAdmin()) {
                document.getElementById('adminContent').style.display = 'block';
            }
        }, 500);
    });
    </script>
</body>
</html>
