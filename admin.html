<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свой Мастер 86 — Админ-панель</title>
    
    <link rel="manifest" href="/HomeWork/manifest.json">
    <meta name="theme-color" content="#E67A4B">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/HomeWork/css/core/variables.css">
    <link rel="stylesheet" href="/HomeWork/css/core/base.css">
    <link rel="stylesheet" href="/HomeWork/css/core/utils.css">
    <link rel="stylesheet" href="/HomeWork/css/components/buttons.css">
    <link rel="stylesheet" href="/HomeWork/css/components/cards.css">
    <link rel="stylesheet" href="/HomeWork/css/components/modals.css">
    <link rel="stylesheet" href="/HomeWork/css/themes/dark.css">
</head>
<body>
    <div class="container py-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <a href="/HomeWork/" class="logo-link d-flex align-items-center gap-2">
                <i class="fas fa-shield-alt" style="color: var(--accent);"></i>
                <span class="fw-bold">Свой Мастер 86 Админ</span>
            </a>
            <nav class="d-flex gap-3">
                <a href="/HomeWork/">Главная</a>
                <a href="/HomeWork/admin.html" class="active">Админ-панель</a>
                <button class="btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="#" id="logoutLink" class="btn btn-sm btn-outline-danger rounded-pill">
                    <i class="fas fa-sign-out-alt me-1"></i> Выйти
                </a>
            </nav>
        </header>

        <!-- Статистика -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-users fa-2x mb-2" style="color: var(--accent);"></i>
                    <h5 id="statUsers">0</h5>
                    <p class="text-secondary">Пользователей</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-user-tie fa-2x mb-2" style="color: var(--accent);"></i>
                    <h5 id="statMasters">0</h5>
                    <p class="text-secondary">Мастеров</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-clipboard-list fa-2x mb-2" style="color: var(--accent);"></i>
                    <h5 id="statOrders">0</h5>
                    <p class="text-secondary">Заказов</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <i class="fas fa-exclamation-triangle fa-2x mb-2" style="color: #dc3545;"></i>
                    <h5 id="statComplaints">0</h5>
                    <p class="text-secondary">Жалоб</p>
                </div>
            </div>
        </div>

        <!-- Табы -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <button class="nav-link active" data-tab="users">Пользователи</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="orders">Заказы</button>
            </li>
        </ul>

        <!-- Таб: Пользователи -->
        <div id="usersTab" class="tab-content active">
            <input type="text" class="form-control mb-3" id="userSearch" placeholder="🔍 Поиск...">
            <div id="usersList"></div>
        </div>

        <!-- Таб: Заказы -->
        <div id="ordersTab" class="tab-content d-none">
            <div id="adminOrdersList"></div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>
    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders.js"></script>
    
    <script src="/HomeWork/js/pages/admin.js"></script>
    <script src="/HomeWork/js/components/mobile-nav.js"></script>
</body>
</html>
