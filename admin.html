<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="/HomeWork/css/themes/theme-aurora.css">
</head>
<body>
    <!-- ДЕСКТОПНАЯ НАВИГАЦИЯ -->
    <div class="desktop-nav">
        <div class="desktop-nav-container">
            <a href="/HomeWork/" class="desktop-nav-item" id="desktopNavHome">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="/HomeWork/admin.html" class="desktop-nav-item active" id="desktopNavOrders">
                <i class="fas fa-shield-alt"></i>
                <span>Админка</span>
            </a>
            <a href="/HomeWork/masters.html" class="desktop-nav-item" id="desktopNavMasters">
                <i class="fas fa-user-tie"></i>
                <span>Мастера</span>
            </a>
            <button class="desktop-nav-item create-btn" id="desktopCreateBtn" style="display: none;">
                <i class="fas fa-plus-circle"></i>
                <span>Создать заказ</span>
            </button>
            <button class="desktop-nav-item auth-btn" id="desktopAuthBtn">
                <i class="fas fa-user-circle"></i>
                <span>Загрузка...</span>
            </button>
        </div>
    </div>

    <!-- ===== ЗАЩИТА АДМИНКИ ===== -->
    <script>
    (function() {
        const checkAdmin = function() {
            if (window.Auth && typeof Auth.isAdmin === 'function') {
                if (!Auth.isAdmin()) {
                    showAccessDenied();
                }
                return;
            }
            
            let attempts = 0;
            const maxAttempts = 30;
            
            const interval = setInterval(() => {
                attempts++;
                
                if (window.Auth && typeof Auth.isAdmin === 'function') {
                    clearInterval(interval);
                    if (!Auth.isAdmin()) {
                        showAccessDenied();
                    } else {
                        document.getElementById('adminContent').style.display = 'block';
                    }
                } else if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    showAccessDenied();
                }
            }, 100);
        };
        
        function showAccessDenied() {
            document.body.innerHTML = '';
            document.body.style.margin = '0';
            document.body.style.background = 'var(--aurora-deep, #0B1E33)';
            
            document.body.innerHTML = `
                <div style="position:fixed; top:0; left:0; right:0; bottom:0; background:var(--aurora-deep, #0B1E33); display:flex; align-items:center; justify-content:center; z-index:9999;">
                    <div style="text-align:center; padding:20px; max-width:400px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:64px; color:var(--accent-urgent, #FF8A5C); margin-bottom:20px; display:block;"></i>
                        <h3 style="color:white; font-size:24px; margin-bottom:15px; font-family: 'Inter', sans-serif;">Доступ запрещён</h3>
                        <p style="color:var(--aurora-text-soft, #B0C4D9); margin-bottom:25px; font-size:16px; line-height:1.5;">Только администратор может войти в этот раздел</p>
                        <a href="/HomeWork/" style="background:var(--aurora-accent, #2CD5C4); color:var(--aurora-deep, #0B1E33); padding:12px 30px; border-radius:60px; text-decoration:none; font-weight:700; display:inline-block; font-family: 'Inter', sans-serif;">
                            <i class="fas fa-home me-2"></i>На главную
                        </a>
                    </div>
                </div>
            `;
            
            window.stop();
        }
        
        checkAdmin();
    })();
    </script>

    <div class="app-wrapper" id="adminContent" style="display: none;">
        <!-- ШАПКА PREMIUM -->
        <div class="header-premium">
            <div class="logo-premium" onclick="window.location.href='/HomeWork/'">
                <span class="logo-premium-text">АДМИН86</span>
                <span class="logo-premium-small">ПАНЕЛЬ</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <a href="#" id="logoutLink" class="city-button-premium" style="background: rgba(220,53,69,0.2); border-color: #dc3545;">
                    <i class="fas fa-sign-out-alt me-1"></i> Выйти
                </a>
                <button class="theme-toggle btn btn-sm btn-outline-secondary rounded-pill" id="themeToggle" title="Сменить тему">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="order-card-premium text-center" style="padding: 20px;">
                    <i class="fas fa-users fa-3x mb-3" style="color: var(--aurora-accent);"></i>
                    <h3 class="fw-bold mb-1" id="statUsers">0</h3>
                    <p class="text-secondary">Пользователей</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="order-card-premium text-center" style="padding: 20px;">
                    <i class="fas fa-user-tie fa-3x mb-3" style="color: var(--aurora-accent);"></i>
                    <h3 class="fw-bold mb-1" id="statMasters">0</h3>
                    <p class="text-secondary">Мастеров</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="order-card-premium text-center" style="padding: 20px;">
                    <i class="fas fa-clipboard-list fa-3x mb-3" style="color: var(--aurora-accent);"></i>
                    <h3 class="fw-bold mb-1" id="statOrders">0</h3>
                    <p class="text-secondary">Заказов</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="order-card-premium text-center" style="padding: 20px;">
                    <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: #dc3545;"></i>
                    <h3 class="fw-bold mb-1" id="statComplaints">0</h3>
                    <p class="text-secondary">Жалоб</p>
                </div>
            </div>
        </div>

        <!-- Табы -->
        <div class="filters-premium mb-4">
            <button class="filter-chip-premium active" data-tab="users">Пользователи</button>
            <button class="filter-chip-premium" data-tab="orders">Заказы</button>
        </div>

        <!-- Таб: Пользователи -->
        <div id="usersTab" class="tab-content">
            <div class="search-premium mb-3">
                <div class="search-glass">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearch" placeholder="Поиск по имени или email...">
                </div>
            </div>
            <div id="usersList" class="orders-list"></div>
        </div>

        <!-- Таб: Заказы -->
        <div id="ordersTab" class="tab-content d-none">
            <div id="adminOrdersList" class="orders-list"></div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" data-page="home">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-item" data-page="search">
            <span class="nav-icon"><i class="fas fa-search"></i></span>

        </button>
        <button class="nav-item" data-page="orders">
            <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>

        </button>
        <button class="nav-item active" data-page="profile">
            <span class="nav-icon"><i class="fas fa-user"></i></span>
            <span class="nav-label">Профиль</span>
        </button>
    </div>

    <!-- Скрипты - ИСПРАВЛЕН ПОРЯДОК -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 1. CORE -->
    <script src="/HomeWork/js/core/config.js"></script>
    <script src="/HomeWork/js/core/constants.js"></script>
    <script src="/HomeWork/js/core/base-utils.js"></script>
    <script src="/HomeWork/js/core/store.js"></script>
    <script src="/HomeWork/js/core/cache.js"></script>
    <script src="/HomeWork/js/core/firebase.js"></script>

    <script src="/HomeWork/js/core/error-handler.js"></script>
    <script src="/HomeWork/js/core/redirect-protection.js"></script>
    
    <!-- 2. SERVICES -->
    <script src="/HomeWork/js/services/data-service.js"></script>
    <script src="/HomeWork/js/services/upload-service.js"></script>
    <script src="/HomeWork/js/services/auth.js"></script>
    <script src="/HomeWork/js/services/orders-service.js"></script>
    <script src="/HomeWork/js/services/moderation.js"></script>
    
    <!-- 3. COMPONENTS -->
    <script src="/HomeWork/js/components/list-renderer.js"></script>
    <script src="/HomeWork/js/components/modal-manager.js"></script>
    <script src="/HomeWork/js/components/stars-renderer.js"></script>
    <script src="/HomeWork/js/components/auth-ui.js"></script>
    <script src="/HomeWork/js/components/bottom-nav.js"></script>
    <script src="/HomeWork/js/components/desktop-nav.js"></script>
    <script src="/HomeWork/js/components/notifications.js"></script>
    
    <!-- 4. APP (ГЛАВНЫЙ) -->
    <script src="/HomeWork/js/app.js"></script>
    
    <!-- 5. PAGE (ВСЕГДА ПОСЛЕДНИМ) -->
    <script src="/HomeWork/js/pages/admin.js"></script>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            if (window.Auth && Auth.isAdmin && Auth.isAdmin()) {
                document.getElementById('adminContent').style.display = 'block';
            }
        }, 500);

        // Переключение табов
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const tab = this.dataset.tab;
                document.getElementById('usersTab').classList.add('d-none');
                document.getElementById('ordersTab').classList.add('d-none');
                document.getElementById(tab + 'Tab').classList.remove('d-none');
            });
        });
    });
    </script>
</body>
</html>
